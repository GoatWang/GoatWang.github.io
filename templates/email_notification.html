<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 0 auto; background: #fff;">
  <img src="https://goatwang.github.io/images/banner_clipped.jpeg" alt="GoatWang's Blog" style="width: 100%; display: block;">
  <table cellpadding="0" cellspacing="0" border="0" style="padding: 16px 24px 12px;">
    <tr>
      <td style="vertical-align: middle; width: 48px;">
        <img src="https://goatwang.github.io/images/avatar.jpeg" alt="GoatWang" style="width: 44px; height: 44px; border-radius: 50%; display: block;">
      </td>
      <td style="vertical-align: middle; padding-left: 12px;">
        <strong style="font-size: 15px; color: #1e1e1e;">GoatWang's Blog</strong><br>
        <span style="font-size: 12px; color: #888;">Test Engineer at Google. Writing about ML, CV, NLP, Web Development, and career journeys.</span>
      </td>
    </tr>
  </table>
  <hr style="border: none; border-top: 1px solid #eee; margin: 0 24px;">
  <div style="padding: 20px 24px;">
    <h2 style="margin: 0 0 14px; font-size: 18px; color: #1e1e1e; line-height: 1.3;">{title}</h2>
    <img src="{cover_image_url}" alt="{title}" style="width: 100%; border-radius: 6px; display: block; margin-bottom: 16px;">
    <p style="color: #555; font-size: 13px; line-height: 1.7; margin: 8px 0 20px;">{summary}</p>
    <div style="text-align: center;">
      <a href="{url}" style="display: inline-block; padding: 10px 28px; background: #1e1e1e; color: #fff; text-decoration: none; border-radius: 5px; font-size: 14px;">Read Post →</a>
    </div>
  </div>
  <hr style="border: none; border-top: 1px solid #eee; margin: 0 24px;">
  <p style="color: #999; font-size: 11px; text-align: center; padding: 14px 24px;">You received this because you subscribed to <a href="https://goatwang.github.io" style="color: #999;">GoatWang's Blog</a>.<br><a href="{{{RESEND_UNSUBSCRIBE_URL}}}" style="color: #999;">Unsubscribe</a></p>
</div>
