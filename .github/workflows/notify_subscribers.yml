name: Notify subscribers on new post

on:
  push:
    branches:
      - master
    paths:
      - 'content/posts/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new posts
        id: detect
        run: |
          # Find newly added post files in this push
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/posts/*.md' || true)
          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts found"
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_new=true" >> "$GITHUB_OUTPUT"
          # Use the first new post
          POST_FILE=$(echo "$NEW_POSTS" | head -1)
          echo "post_file=$POST_FILE" >> "$GITHUB_OUTPUT"

          # Extract title from frontmatter
          TITLE=$(sed -n '/^title:/s/^title: *//p' "$POST_FILE" | sed "s/^['\"]//;s/['\"]$//")
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          # Build post URL from filename
          SLUG=$(basename "$POST_FILE" .md)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "url=https://goatwang.github.io/posts/$SLUG/" >> "$GITHUB_OUTPUT"

          # Extract description or first paragraph
          DESC=$(sed -n '/^---$/,/^---$/d;/^$/d;p' "$POST_FILE" | head -3 | tr '\n' ' ')
          echo "description=$DESC" >> "$GITHUB_OUTPUT"

      - name: Send email to subscribers
        if: steps.detect.outputs.has_new == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          POST_TITLE: ${{ steps.detect.outputs.title }}
          POST_URL: ${{ steps.detect.outputs.url }}
          POST_DESC: ${{ steps.detect.outputs.description }}
        run: |
          # Read config
          FROM_EMAIL=$(jq -r '.resend.from_email' config.json)
          FROM_NAME=$(jq -r '.resend.from_name' config.json)
          SITE_TITLE=$(jq -r '.site.title' config.json)

          # Send broadcast email
          curl -s -X POST 'https://api.resend.com/emails/batch' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg from "$FROM_NAME <$FROM_EMAIL>" \
              --arg audience_id "$RESEND_AUDIENCE_ID" \
              --arg subject "New Post: $POST_TITLE" \
              --arg html "<div style='font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto;'><h2 style='margin-bottom: 8px;'>$POST_TITLE</h2><p style='color: #666; margin-bottom: 16px;'>$POST_DESC</p><a href='$POST_URL' style='display: inline-block; padding: 10px 24px; background: #1e1e1e; color: #fff; text-decoration: none; border-radius: 4px;'>Read Post</a><hr style='margin-top: 32px; border: none; border-top: 1px solid #eee;'><p style='color: #999; font-size: 12px;'>You received this because you subscribed to $SITE_TITLE.</p></div>" \
              '[{from: $from, to: "audience:" + $audience_id, subject: $subject, html: $html}]'
            )"
